services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: farmer_api_prod
    restart: always
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  dashboard:
    build:
      context: ..
      dockerfile: dashboard/Dockerfile
    container_name: farmer_dashboard_prod
    restart: always
    ports:
      - "80:80"

  db:
    image: postgres:15-alpine
    container_name: farmer_db_prod
    restart: always
    env_file:
      - ../.env
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: farmer_redis_prod
    restart: always

volumes:
  postgres_prod_data:
